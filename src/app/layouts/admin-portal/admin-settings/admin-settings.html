<div class="admin-settings">
  <div class="page-header">
    <div>
      <h1 class="page-title">Settings</h1>
      <p class="page-subtitle">Manage admin preferences and election configuration</p>
    </div>
  </div>

  <div class="settings-content">
    <div class="settings-section">
      <div class="section-header">
        <h2>Notification Preferences</h2>
        <p>Control how and when you get alerted about ELECOM activity.</p>
      </div>

      <div class="toggle-group">
        <div class="toggle-item" *ngFor="let pref of notifPreferences">
          <div class="toggle-info">
            <span class="toggle-label">{{ pref.label }}</span>
            <span class="toggle-desc">{{ pref.description }}</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" [(ngModel)]="pref.enabled" />
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-save" (click)="saveNotifPrefs()">Save Preferences</button>
      </div>
    </div>
  </div>
</div>
